<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacola de Compras - Infinite Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .carrinho-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        button {
            margin-left: 10px;
        }

        .imagem-carregada {
            position: absolute;
            top: 10px;
            left: 10px;
            height: auto;
            z-index: 1;
        }

        .carrinho-item .imagem-carregada {
            width: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>SACOLA DE COMPRAS</h1>
</header>

<main>
    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="img/1727998195631.png">
            </a>
        </div>

        <div class="menu-icon" onclick="abrirMenu()">
            <img src="img/menu.png">
        </div>

        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="indexperso.html">Personalizar</a></li>
            <li><a href="indexsobre.html">Sobre</a></li>
            <li><a href="indxexcontato.html">Contato</a></li>
            <li>
                <a href="indexcar.html" class="carrinho-link">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="contador-carrinho"></span>
                </a>
            </li>
        </ul>
    </nav>

    <div id="carrinho-itens"></div>

</main>

<footer>
    <div id="total-compra">Total: R$ 0,00</div>
    <div>
        <button onclick="continuarComprando()">Continuar comprando</button>
        <button onclick="finalizarCompra()">Finalizar Compra</button>
    </div>
</footer>

<!-- script.js primeiro para carregar abrirMenu e atualizarContador -->
<script src="script.js"></script>

<!-- funções exclusivas do carrinho -->
<script>
    function mostrarCarrinho() {
        const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        const carrinhoDiv = document.getElementById('carrinho-itens');
        const totalDiv = document.getElementById('total-compra');
        carrinhoDiv.innerHTML = '';
        let total = 0;

        if (carrinho.length === 0) {
            carrinhoDiv.innerHTML = '<p>Seu carrinho está vazio.</p>';
            totalDiv.innerHTML = 'Total: R$ 0,00';
            return;
        }

        carrinho.forEach((item, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.classList.add('carrinho-item');
            const itemTotal = item.preco * item.quantidade;
            total += itemTotal;
            itemDiv.innerHTML = `
                ${item.imagemCarregadaUrl ? `<img src="${item.imagemCarregadaUrl}" alt="Imagem Carregada" class="imagem-carregada" />` : ''}
                <img src="${item.imagem}" alt="${item.nome}" width="100">
                <p>${item.nome} - Tamanho: ${item.tamanho} - Qtd: ${item.quantidade} - R$ ${itemTotal.toFixed(2)}</p>
                <span class="lixeira" onclick="removerItem(${index})">🗑️</span>
                <button class="deletar" onclick="removerItem(${index})">Deletar</button>
            `;
            carrinhoDiv.appendChild(itemDiv);
        });

        totalDiv.innerHTML = `Total: R$ ${total.toFixed(2)}`;
    }

    function removerItem(index) {
        const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        carrinho.splice(index, 1);
        localStorage.setItem('carrinho', JSON.stringify(carrinho));
        mostrarCarrinho();
        atualizarContador();
    }

    function finalizarCompra() {
        alert('Compra finalizada! Obrigado!');
        localStorage.removeItem('carrinho');
        mostrarCarrinho();
        atualizarContador();
    }

    function continuarComprando() {
        window.location.href = 'index.html';
    }

    // Mostra o carrinho assim que a página carrega
    mostrarCarrinho();
</script>

</body>
</html>
